<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRENT SNOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 25% 30%, rgba(120, 180, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 75% 70%, rgba(200, 140, 255, 0.06) 0%, transparent 60%),
                #000000;
            z-index: -1;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
            box-shadow: 
                0 0 2px #fff,
                120px 80px 2px #fff,
                240px 160px 1px #fff,
                400px 60px 2px #fff,
                550px 220px 1px #fff,
                700px 120px 2px #fff,
                850px 300px 1px #fff,
                1000px 90px 2px #fff,
                1150px 250px 1px #fff,
                1300px 150px 2px #fff;
            animation: twinkle 4s infinite alternate;
        }
        
        .main-title {
            font-size: 13vw;
            line-height: 0.85;
            font-weight: 900;
            letter-spacing: -0.06em;
            text-shadow: 0 0 60px rgba(255,255,255,0.3);
        }
        
        .tagline {
            font-size: 3.8rem;
            line-height: 1.05;
            font-weight: 300;
            letter-spacing: -0.03em;
        }
        
        .nav-btn {
            font-size: 1.4rem;
            padding: 26px 70px;
            border: 1.5px solid #ffffff;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            letter-spacing: 2px;
        }
        
        .nav-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transform: translateY(-4px);
        }
    </style>
</head>
<body>

    <div class="universe"></div>
    <div class="stars"></div>
    
    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-6">
        
        <h1 class="main-title text-white tracking-tighter">BRENT SNOW</h1>
        
        <p class="tagline mt-10 text-amber-300">
            I AM THE CENTER<br>OF THE UNIVERSE
        </p>
        
        <div class="mt-24 flex flex-col sm:flex-row gap-8">
            
            <a href="https://github.com" target="_blank"
               class="nav-btn text-white hover:text-amber-400">PROJECTS</a>
            
            <a href="#" id="dev-link"
               class="nav-btn text-white hover:text-amber-400">DEV</a>
            
            <a href="https://dnd.brentsnow.ca"
               class="nav-btn text-white hover:text-amber-400">D&amp;D</a>
            
        </div>
        
    </div>

    <script>
        document.getElementById('dev-link').href = '#';
    </script>

</body>
</html>
