<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brent Snow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    text-align: center;
    max-width: 420px;
  }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; font-weight: 600; }
  p { color: #8b949e; margin-bottom: 2rem; }
  .links { display: flex; flex-direction: column; gap: 0.75rem; }
  a {
    display: block;
    padding: 1rem 1.5rem;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e6edf3;
    text-decoration: none;
    transition: all 0.15s;
  }
  a:hover {
    background: #1f6feb;
    border-color: #1f6feb;
    transform: translateY(-1px);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Brent Snow</h1>
    <p>Welcome.</p>
    <div class="links">
      <a href="https://github.com/Bchilled" target="_blank" rel="noopener">GitHub</a>
      <a href="https://dnd.brentsnow.ca" target="_blank" rel="noopener">D&amp;D Campaign</a>
    </div>
  </div>
</body>
</html>
